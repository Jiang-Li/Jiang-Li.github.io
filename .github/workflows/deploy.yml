name: Deploy Site
on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
    - uses: actions/checkout@v4

    # Needed because teach/course-schedule.qmd still contains Python code cells
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.9'
        cache: 'pip'

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pandas numpy jupyter nbclient nbconvert ipykernel

    - name: Set up Quarto
      uses: quarto-dev/quarto-actions/setup@v2

    # Render the full website (always — partial renders break the site)
    - name: Render full website
      run: |
        echo "🌐 Rendering complete website..."
        quarto render
        echo "✅ Full website rendered successfully"
        echo "📊 Verifying key pages exist:"
        for page in index.html course.html; do
          if [ -f "_site/$page" ]; then
            echo "  ✅ $page ($(du -h _site/$page | cut -f1))"
          else
            echo "  ❌ $page MISSING" && exit 1
          fi
        done

    - name: Setup Pages
      uses: actions/configure-pages@v4

    - name: Upload site
      uses: actions/upload-pages-artifact@v3
      with:
        path: _site

    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4

    - name: Report deployment success
      run: |
        echo "🎉 Site deployed successfully!"
        echo "🌐 Website deployed to: ${{ steps.deployment.outputs.page_url }}"
